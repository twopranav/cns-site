<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pranav Kiran Kumar</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Courier+Prime&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0a0a0a;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.03) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(255,255,255,0.02) 0%, transparent 60%);
      font-family: 'Courier Prime', monospace;
    }

    .container {
      text-align: center;
      padding: 3rem;
      animation: fadeIn 1.2s ease forwards;
      opacity: 0;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(2rem, 6vw, 4.5rem);
      color: #f0ece4;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .roll {
      font-family: 'Courier Prime', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      color: #777;
      margin-top: 1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .line {
      width: 40px;
      height: 1px;
      background: #444;
      margin: 1.2rem auto;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pranav Kiran Kumar</h1>
    <div class="line"></div>
    <p class="roll">1BM23CB036</p>
  </div>
</body>
</html>
